server:
  port: 8081

spring:
  application:
    name: gio-api

  servlet:
    multipart:
      max-file-size: 20MB        # 单文件最大 20MB
      max-request-size: 200MB    # 单请求最大 200MB
      file-size-threshold: 0     # 不使用临时文件缓存

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://140.143.87.54:3306/gio_design?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "@Yuku007@"
    hikari:
      maximum-pool-size: 30          # 最大连接数（支持更多并发请求）
      minimum-idle: 10               # 最小空闲连接
      idle-timeout: 600000           # 空闲连接超时 10 分钟
      max-lifetime: 1800000          # 连接最大生命周期 30 分钟
      connection-timeout: 30000      # 连接获取超时 30 秒
      validation-timeout: 5000       # 连接验证超时 5 秒
      leak-detection-threshold: 60000 # 连接泄露检测阈值

  # 静态文件配置
  web:
    resources:
      static-locations: classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./uploads/,file:E:\\my_projects\\gio\\uploads\\

  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 465
    username: 597667676@qq.com
    password: fymhnpxcresobcah
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.required: true
      mail.smtp.socketFactory.class: javax.net.ssl.SSLSocketFactory

# 管理员通知邮箱
notification:
  admin-emails: 523094173@qq.com,597667676@qq.com

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gio.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: gio-design-secret-key-2026-production-use-this
  expiration: 86400000  # 24 小时
  header: Authorization
  prefix: Bearer

# 文件上传配置
file:
  upload-path: ./uploads/
  image-types: jpg,jpeg,png,gif,webp

# 日志配置
logging:
  level:
    com.gio: debug
    com.gio.mapper: debug

# AI 配置（通义千问 + 通义万相）
ai:
  dashscope:
    api-key: sk-sp-ccff0d12fb58427ca9e3f09545b5c43d
    base-url: https://coding.dashscope.aliyuncs.com/v1
    model: qwen3.5-plus
    # 通义万相配置
    image-model: wanx-v1
