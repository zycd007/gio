<h2>顶部工具栏设计</h2>
<p class="subtitle">筛选、搜索和新建按钮的布局方式</p>

<div class="cards">
  <!-- 方案 A：左新建 + 右筛选 -->
  <div class="card" data-choice="left-right" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup" style="background: white; padding: 16px; border-bottom: 1px solid #e2e8f0;">
        <div style="display: flex; align-items: center; gap: 16px;">
          <!-- 左侧：新建按钮 -->
          <button style="padding: 10px 20px; background: linear-gradient(135deg, #10b981 0%, #14b8a6 100%); border-radius: 12px; color: white; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px;">
            <span>+</span> 新建项目
          </button>
          <!-- 右侧：筛选区 -->
          <div style="flex: 1; display: flex; align-items: center; gap: 8px; justify-content: flex-end;">
            <input style="padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; width: 200px; font-size: 12px;" placeholder="🔍 搜索项目名称...">
            <select style="padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 12px;">
              <option>全部分类</option>
            </select>
            <select style="padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 12px;">
              <option>全部状态</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 左新建 + 右筛选（当前布局）</h3>
      <p>新建按钮醒目，筛选工具靠右</p>
    </div>
  </div>

  <!-- 方案 B：顶部两行布局 -->
  <div class="card" data-choice="two-rows" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup" style="background: white; padding: 16px; border-bottom: 1px solid #e2e8f0;">
        <!-- 第一行：标题 + 统计 -->
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <span style="font-size: 16px; font-weight: 600; color: #1e293b;">项目管理</span>
            <span style="background: #f1f5f9; padding: 4px 12px; border-radius: 8px; font-size: 12px; color: #64748b;">共 24 个项目</span>
          </div>
          <button style="padding: 10px 20px; background: linear-gradient(135deg, #10b981 0%, #14b8a6 100%); border-radius: 12px; color: white; font-size: 13px; font-weight: 500;">
            + 新建项目
          </button>
        </div>
        <!-- 第二行：筛选工具 -->
        <div style="display: flex; align-items: center; gap: 8px;">
          <input style="padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; flex: 1; max-width: 300px; font-size: 12px;" placeholder="🔍 搜索项目名称...">
          <select style="padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 12px;">
            <option>全部分类</option>
          </select>
          <select style="padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 12px;">
            <option>全部状态</option>
          </select>
          <select style="padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 12px;">
            <option>精品筛选</option>
          </select>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 两行布局（推荐）</h3>
      <p>标题统计独立一行，筛选工具展开显示</p>
      <div class="pros-cons" style="margin-top: 8px;">
        <div class="pros"><h4>优点</h4><ul><li>信息层次清晰</li><li>筛选工具一目了然</li><li>统计数字醒目</li></ul></div>
      </div>
    </div>
  </div>

  <!-- 方案 C：紧凑一行 -->
  <div class="card" data-choice="compact" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup" style="background: white; padding: 12px 16px; border-bottom: 1px solid #e2e8f0;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <input style="padding: 6px 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; flex: 1; font-size: 11px;" placeholder="搜索...">
          <select style="padding: 6px 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 11px;">
            <option>分类</option>
          </select>
          <select style="padding: 6px 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 11px;">
            <option>状态</option>
          </select>
          <button style="padding: 8px 16px; background: linear-gradient(135deg, #10b981 0%, #14b8a6 100%); border-radius: 10px; color: white; font-size: 12px;">
            + 新建
          </button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 紧凑一行</h3>
      <p>极简风格，适合小屏幕</p>
      <div class="pros-cons" style="margin-top: 8px;">
        <div class="pros"><h4>优点</h4><ul><li>占用空间最小</li></ul></div>
        <div class="cons"><h4>注意</h4><ul><li>筛选不够醒目</li><li>无统计数据展示</li></ul></div>
      </div>
    </div>
  </div>
</div>

<p style="margin-top: 16px; color: #64748b; font-size: 13px;">点击选择顶部工具栏布局</p>
